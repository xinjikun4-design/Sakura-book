<title>Sakura和哥哥交互协议</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(180deg,#fff8fc,#ffeef7,#fff9fc);

font-family:-apple-system,BlinkMacSystemFont,"PingFang SC";

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

color:#555;

}

.card{

width:90%;

max-width:750px;

background:rgba(255,255,255,.7);

backdrop-filter:blur(18px);

padding:70px;

border-radius:35px;

box-shadow:0 20px 60px rgba(255,120,170,.18);

text-align:center;

}

h1{

font-size:44px;

color:#ff6f9d;

margin-bottom:15px;

}

.version{

color:#ff9fbb;

margin-bottom:60px;

}

p{

font-size:22px;

line-height:2.1;

margin-bottom:15px;

}

button{

margin-top:60px;

padding:18px 60px;

border:none;

border-radius:999px;

font-size:22px;

cursor:pointer;

background:linear-gradient(90deg,#ff9ac5,#ff74b6);

color:white;

transition:.3s;

box-shadow:0 10px 25px rgba(255,120,180,.35);

}

button:hover{

transform:translateY(-4px) scale(1.03);

}

.footer{

margin-top:60px;

color:#ff8bb3;

font-size:16px;

}

.flower{

position:fixed;

font-size:28px;

animation:float 8s linear infinite;

opacity:.35;

}

.f1{
left:8%;
top:12%;
}

.f2{
right:10%;
top:22%;
animation-delay:2s;
}

.f3{
left:15%;
bottom:15%;
animation-delay:4s;
}

.f4{
right:18%;
bottom:10%;
animation-delay:6s;
}

@keyframes float{

0%{

transform:translateY(0px) rotate(0deg);

}

50%{

transform:translateY(-18px) rotate(15deg);

}

100%{

transform:translateY(0px) rotate(0deg);

}

}

</style>

</head>

<body>

<div class="flower f3">🌸</div>
